# Unpackaged (Velopack 配布) 版向けの CI。MSIX パッケージングは行わない。

name: Files CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'assets/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'assets/**'
      - 'docs/**'
      - '*.md'

run-name: ${{ github.event_name == 'pull_request' && 'Files PR Validation' || 'Files CI Validation' }}

env:
  SOLUTION_PATH: '${{ github.workspace }}\Wilds.slnx'
  APP_PROJECT_PATH: '${{ github.workspace }}\src\Wilds.App\Wilds.App.csproj'

jobs:

  check-formatting:
    runs-on: windows-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: Install XamlStyler.Console
        run: dotnet tool install --global XamlStyler.Console

      - name: Check XAML formatting
        id: check-step
        shell: pwsh
        run: |
          $changedFiles = (git diff --diff-filter=d --name-only HEAD~1) -split "\n" | Where-Object {$_ -like "*.xaml"}
          foreach ($file in $changedFiles)
          {
            xstyler -p -l None -f $file
            if ($LASTEXITCODE -ne 0)
            {
              echo "::error file=$file::Format check failed"
            }
          }
        continue-on-error: true

      - name: Fail if necessary
        if: steps.check-step.outcome == 'failure'
        run: exit 1

  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64, arm64]
    env:
      CONFIGURATION: ${{ matrix.configuration }}
      ARCHITECTURE: ${{ matrix.platform }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        shell: pwsh
        run: |
          msbuild $env:SOLUTION_PATH `
            -t:Restore `
            -p:Platform=$env:ARCHITECTURE `
            -p:Configuration=$env:CONFIGURATION `
            -v:quiet

      - name: Build Files (Unpackaged)
        shell: pwsh
        run: |
          msbuild $env:APP_PROJECT_PATH `
            -t:Build `
            -p:Configuration=$env:CONFIGURATION `
            -p:Platform=$env:ARCHITECTURE `
            -v:quiet
